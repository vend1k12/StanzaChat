version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(repo)"
      include: scope
    labels:
      - dependencies
      - npm
    groups:
      npm-tooling-minor-and-patch:
        patterns:
          - "*"
        applies-to: version-updates
        update-types:
          - minor
          - patch
      npm-security:
        patterns:
          - "*"
        applies-to: security-updates
        update-types:
          - patch
          - minor
          - major
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    cooldown:
      default-days: 7
    commit-message:
      prefix: "ci"
      include: scope
    labels:
      - dependencies
      - github-actions
    groups:
      github-actions-minor-and-patch:
        patterns:
          - "*"
        applies-to: version-updates
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
