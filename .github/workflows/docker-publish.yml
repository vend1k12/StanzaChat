name: Docker Publish

on:
  push:
    branches: [main]
  release:
    types: [published]

concurrency:
  group: docker-publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Guard - Dockerfile present
        id: guard
        shell: bash
        run: |
          set -euo pipefail
          if [ -f docker/app.Dockerfile ]; then
            echo "has_targets=1" >> "$GITHUB_OUTPUT"
          else
            echo "has_targets=0" >> "$GITHUB_OUTPUT"
            echo "skipped: target not present (docker/app.Dockerfile missing)"
          fi

      - name: Set up QEMU
        if: steps.guard.outputs.has_targets == '1'
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        if: steps.guard.outputs.has_targets == '1'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        if: steps.guard.outputs.has_targets == '1'
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/vend1k12/stanzachat
          tags: |
            type=edge,branch=main
            type=semver,pattern={{version}},event=release
            type=semver,pattern={{major}}.{{minor}},event=release
            type=semver,pattern={{major}},event=release
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
          labels: |
            org.opencontainers.image.title=StanzaChat
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and push
        if: steps.guard.outputs.has_targets == '1'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: docker/app.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
