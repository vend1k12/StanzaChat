name: Docker Publish

on:
  push:
    branches: [main]
  release:
    types: [published]

concurrency:
  group: docker-publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Guard - Dockerfile present
        id: guard
        shell: bash
        run: |
          set -euo pipefail
          if [ -f docker/app.Dockerfile ]; then
            echo "has_targets=1" >> "$GITHUB_OUTPUT"
          else
            echo "has_targets=0" >> "$GITHUB_OUTPUT"
            echo "skipped: target not present (docker/app.Dockerfile missing)"
          fi

      - name: Set up QEMU
        if: steps.guard.outputs.has_targets == '1'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        if: steps.guard.outputs.has_targets == '1'
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        if: steps.guard.outputs.has_targets == '1'
        id: meta
        uses: docker/metadata-action@8e5442c4ef9f78752691e2d8f8d19755c6f78e81 # v5.5.1
        with:
          images: ghcr.io/vend1k12/stanzachat
          tags: |
            type=edge,branch=main
            type=semver,pattern={{version}},event=release
            type=semver,pattern={{major}}.{{minor}},event=release
            type=semver,pattern={{major}},event=release
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
          labels: |
            org.opencontainers.image.title=StanzaChat
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and push
        if: steps.guard.outputs.has_targets == '1'
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: .
          file: docker/app.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
