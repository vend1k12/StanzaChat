name: DCO

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: read

jobs:
  dco:
    name: Signed-off-by check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Fetch both PR head and base so we can enumerate the PR's commits.
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify every commit is signed off
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          echo "Checking commits ${BASE_SHA}..${HEAD_SHA}"
          missing=0
          # `git log` with %H %an %ae %s|BODY is fragile across newlines,
          # so we walk the SHA list and inspect each commit's full message.
          shas=$(git rev-list "${BASE_SHA}..${HEAD_SHA}")
          if [ -z "${shas}" ]; then
            echo "No commits in range; nothing to verify."
            exit 0
          fi
          for sha in ${shas}; do
            author_name=$(git log -1 --format='%an' "${sha}")
            author_email=$(git log -1 --format='%ae' "${sha}")
            subject=$(git log -1 --format='%s' "${sha}")
            expected="Signed-off-by: ${author_name} <${author_email}>"
            body=$(git log -1 --format='%B' "${sha}")
            if echo "${body}" | grep -qiE '^Signed-off-by: .+ <.+@.+>$'; then
              if echo "${body}" | grep -qF "${expected}"; then
                echo "ok    ${sha}  ${subject}"
              else
                echo "ok*   ${sha}  ${subject}  (signed off, author mismatch tolerated)"
              fi
            else
              echo "FAIL  ${sha}  ${subject}"
              echo "      missing: ${expected}"
              missing=$((missing + 1))
            fi
          done
          if [ "${missing}" -gt 0 ]; then
            echo ""
            echo "::error::${missing} commit(s) missing a Signed-off-by trailer."
            echo "Fix with:  git rebase --signoff ${BASE_SHA}  &&  git push --force-with-lease"
            echo "See CONTRIBUTING.md and https://developercertificate.org/"
            exit 1
          fi
          echo "All commits are signed off."
