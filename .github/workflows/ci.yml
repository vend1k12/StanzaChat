name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: ESLint
        run: bun run lint
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Prettier check
        run: bun x prettier --check .

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run check-types
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.test ? 0 : 1);"; then
            echo "Running bun run test"
            bun run test
          else
            echo "skipped: no test script yet (pre-Phase-1)"
            exit 0
          fi
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Guard - integration targets present
        id: guard
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob globstar
          has_targets=0
          for dir in packages/db packages/auth; do
            if [ -d "$dir" ]; then
              matches=("$dir"/**/*.test.ts "$dir"/**/*.test.tsx "$dir"/**/*.spec.ts "$dir"/**/*.spec.tsx "$dir"/**/*.integration.test.ts)
              if [ ${#matches[@]} -gt 0 ]; then
                has_targets=1
                break
              fi
            fi
          done
          echo "has_targets=${has_targets}" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        if: steps.guard.outputs.has_targets == '1'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Setup Node
        if: steps.guard.outputs.has_targets == '1'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Install dependencies
        if: steps.guard.outputs.has_targets == '1'
        run: bun install --frozen-lockfile

      - name: Run integration tests
        if: steps.guard.outputs.has_targets == '1'
        run: bun run test:integration
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Skip notice
        if: steps.guard.outputs.has_targets != '1'
        run: 'echo "skipped: target not present (no test files in packages/db or packages/auth)"'

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Guard - Playwright config present
        id: guard
        shell: bash
        run: |
          set -euo pipefail
          if git ls-files | grep -E '(^|/)playwright\.config\.(ts|js|mjs|cjs)$' >/dev/null 2>&1; then
            echo "has_targets=1" >> "$GITHUB_OUTPUT"
          else
            echo "has_targets=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        if: steps.guard.outputs.has_targets == '1'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Setup Node
        if: steps.guard.outputs.has_targets == '1'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Install dependencies
        if: steps.guard.outputs.has_targets == '1'
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        if: steps.guard.outputs.has_targets == '1'
        run: bun x playwright install --with-deps chromium

      - name: Run Playwright E2E
        if: steps.guard.outputs.has_targets == '1'
        run: bun run test:e2e
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Upload Playwright traces on failure
        if: failure() && steps.guard.outputs.has_targets == '1'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-traces
          path: |
            **/playwright-report/**
            **/test-results/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Skip notice
        if: steps.guard.outputs.has_targets != '1'
        run: 'echo "skipped: target not present (no playwright.config.* in repo)"'

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Guard - Dockerfile present
        id: guard
        shell: bash
        run: |
          set -euo pipefail
          if [ -f docker/app.Dockerfile ]; then
            echo "has_targets=1" >> "$GITHUB_OUTPUT"
          else
            echo "has_targets=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.guard.outputs.has_targets == '1'
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build Docker image (no push)
        if: steps.guard.outputs.has_targets == '1'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: docker/app.Dockerfile
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Skip notice
        if: steps.guard.outputs.has_targets != '1'
        run: 'echo "skipped: target not present (docker/app.Dockerfile missing)"'
