name: Semgrep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  semgrep:
    name: semgrep scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # OSS mode: no SEMGREP_APP_TOKEN, no SaaS upload. `--error` makes findings
    # fail the job so this is a blocking required check.
    container:
      image: semgrep/semgrep:latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run semgrep
        run: semgrep scan --config auto --config .semgrep/guardrails.yml --error
