name: release-please

# Watches main and maintains a running release PR (aggregated CHANGELOG,
# version bump). Merging that PR creates the git tag `vX.Y.Z` + GitHub
# Release, which the Docker publish workflow reacts to. Tags come only
# from release-please; manual tagging is prohibited.
# See docs/processes/release.md.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          # Prefer a fine-grained PAT (or GitHub App token) so the release
          # PR opened by this action triggers required CI checks; falls
          # back to GITHUB_TOKEN, whose PRs do NOT trigger workflow runs
          # (maintainers would have to close/reopen the release PR to
          # kick off CI). See release.md checklist.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
